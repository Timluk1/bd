services:
  pg:
    image: postgres:17
    environment:
      POSTGRES_DB: music
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 5s
      timeout: 3s
      retries: 3

  flyway:
    image: flyway/flyway:latest
    depends_on:
      pg:
        condition: service_healthy
    volumes:
      - ./migrations:/flyway/sql
    command: -url=jdbc:postgresql://pg:5432/music -user=user -password=password migrate

volumes:
  pgdata: