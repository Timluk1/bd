services:
  primary:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator_password
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      - -c
      - hot_standby=on
      - -c
      - listen_addresses=*
    ports:
      - "5433:5432"
    volumes:
      - primary_data:/var/lib/postgresql/data
      - ./postgres/primary/init-primary.sh:/docker-entrypoint-initdb.d/01-init-primary.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U postgres -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  standby1:
    image: postgres:15
    restart: unless-stopped
    depends_on:
      primary:
        condition: service_healthy
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator_password
      REPLICATION_SLOT: standby1_slot
      PRIMARY_HOST: primary
      PRIMARY_PORT: 5432
    entrypoint: ["/bin/bash", "/usr/local/bin/init-replica.sh"]
    ports:
      - "5434:5432"
    volumes:
      - standby1_data:/var/lib/postgresql/data
      - ./postgres/replica/configure-standby.sh:/usr/local/bin/configure-standby.sh:ro
      - ./postgres/replica/docker-entrypoint-replica.sh:/usr/local/bin/docker-entrypoint-replica.sh:ro
      - ./postgres/replica/init-replica.sh:/usr/local/bin/init-replica.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  standby2:
    image: postgres:15
    restart: unless-stopped
    depends_on:
      primary:
        condition: service_healthy
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator_password
      REPLICATION_SLOT: standby2_slot
      PRIMARY_HOST: primary
      PRIMARY_PORT: 5432
    entrypoint: ["/bin/bash", "/usr/local/bin/init-replica.sh"]
    ports:
      - "5435:5432"
    volumes:
      - standby2_data:/var/lib/postgresql/data
      - ./postgres/replica/configure-standby.sh:/usr/local/bin/configure-standby.sh:ro
      - ./postgres/replica/docker-entrypoint-replica.sh:/usr/local/bin/docker-entrypoint-replica.sh:ro
      - ./postgres/replica/init-replica.sh:/usr/local/bin/init-replica.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  primary_data:
  standby1_data:
  standby2_data:
